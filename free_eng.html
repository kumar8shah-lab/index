<style>

/* Back button style */
.back-btn {
    background-color: #E7D2A4;
    color: #5A4520;
    font-size: 32px;
    padding: 15px;
    border-radius: 50%;
    cursor: pointer;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    position: absolute;
    left: 37%;
    top: 10%;
    transform: translate(-37%, -50%);
    z-index: 2;
}

.back-btn:hover {
    background-color: #D8BD84;
    color: #ffff00;
    transform: translate(-42%, -50%) scale(1.1);
}
/* Page name style */
.page-name {
    background-color: #EFE3C8;
	color:#2B2B2B;
    padding: 10px 30px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 18px;
    position: absolute;
    left: 46%;
    top: 11%;
    transform: translate(-46%, -50%);
    z-index: 1;
}

.page-name::before {
    content: '\00a0\00a0';
}

body {
  font-family: Arial, sans-serif;
  background: #f8f1e9;
  margin: 0;
  padding: 20px;
}

.container {
  display: flex;
  gap: 50px;
  max-width: 1100px;
  margin: 0 auto;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 140px;
}

canvas {
  background: #fff;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  border-radius: 12px;
  max-width: 100%;
  height: auto;
}

.form {
  width: 380px;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h3 {
  margin-top: 0;
  color: #8B0000;
  text-align: center;
}

.field {
  display: flex;
  align-items: center;
  margin-bottom: 16px;
}

.field input {
  flex: 1;
  padding: 10px 12px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 15px;
}

.limit {
  width: 38px;
  height: 38px;
  background: #f4a261;
  color: white;
  text-align: center;
  line-height: 38px;
  margin-left: 10px;
  border-radius: 50%;
  font-size: 13px;
  font-weight: bold;
}

button {
  padding: 14px 28px;
  margin: 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
}

button.reset { background: #e76f51; color: white; }
button.download { background: #2a9d8f; color: white; }

/* Style for the floating WhatsApp button */
.floating-whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 1000;
}

/* Style for the image itself */
.floating-whatsapp-img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    transition: transform 0.3s ease;
}

.floating-whatsapp-img:hover {
    transform: scale(1.1);
}

@media (max-width: 768px) {
  .container {
    margin-top: 100px;
    gap: 20px;
  }
  
  .form {
    width: 90%;
    max-width: 380px;
  }
  
  .back-btn {
    font-size: 24px;
    padding: 12px;
    left: 5%;
    top: 5%;
    transform: translate(0, 0);
  }
  
  .back-btn:hover {
    transform: scale(1.1);
  }
  
  .page-name {
    left: 50%;
    top: 5%;
    transform: translate(-50%, 0);
    font-size: 14px;
    padding: 8px 20px;
  }
}

</style>

function draw() {
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  ctx.textAlign = "center";
  ctx.fillStyle = "#5C0000";
  ctx.shadowColor = "rgba(255,255,255,0.9)";
  ctx.shadowBlur = 8;

  const v1 = document.getElementById("f1").value || "";
  const v2 = document.getElementById("f2").value || "";
  const v3 = document.getElementById("f3").value || "";
  const v4 = document.getElementById("f4").value || "";
  const v5 = document.getElementById("f5").value || "";
  const v6 = document.getElementById("f6").value || "";
  const v7 = document.getElementById("f7").value || "";
  const v8 = document.getElementById("f8").value || "";
  const v9 = document.getElementById("f9").value || "";

  ctx.font = "17px Georgia";
  ctx.fillText("We request the honor of your ", 250, 170);
  ctx.fillText("presence at the marriage of", 250, 192);

  ctx.font = "bold 29px Georgia";
  ctx.fillText(v1, 250, 255);
  ctx.font = "16.5px Georgia";
  ctx.fillText(v2, 250, 288);

  ctx.font = "bold 38px Georgia";
  ctx.fillText("&", 250, 335);

  ctx.font = "bold 29px Georgia";
  ctx.fillText(v3, 250, 380);
  ctx.font = "16.5px Georgia";
  ctx.fillText(v4, 250, 413);

  ctx.font = "bold 16px Georgia";
  ctx.fillText("ON", 250, 460);
  ctx.font = "bold 18px Georgia";
  ctx.fillText(v5, 250, 492);
  ctx.fillText(v6, 250, 518);

  ctx.font = "bold 16px Georgia";
  ctx.fillText("VENUE", 250, 570);
  ctx.font = "16.5px Georgia";
  ctx.fillText(v7, 250, 602);
  ctx.fillText(v8, 250, 626);
  ctx.fillText(v9, 250, 650);

  // Blue transparent bar (bottom)
  ctx.fillStyle = "rgba(217, 169, 194, 0.9)";
  ctx.fillRect(0, canvas.height - 30, canvas.width, 30);

  // White text
  ctx.fillStyle = "#000000";
  ctx.font = "15px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  ctx.fillText("On videocard.in, you can get cards with numerous designs.", canvas.width / 2, canvas.height - 12.5);
  
  ctx.restore();
}

document.querySelectorAll("input").forEach(i => i.addEventListener("input", draw));

function resetForm() {
  document.querySelectorAll("input").forEach(i => i.value = "");
  draw();
}
