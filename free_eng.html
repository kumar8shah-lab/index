function draw() {
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  ctx.textAlign = "center";
  ctx.fillStyle = "#5C0000";
  ctx.shadowColor = "rgba(255,255,255,0.9)";
  ctx.shadowBlur = 8;

  const v1 = document.getElementById("f1").value || "";
  const v2 = document.getElementById("f2").value || "";
  const v3 = document.getElementById("f3").value || "";
  const v4 = document.getElementById("f4").value || "";
  const v5 = document.getElementById("f5").value || "";
  const v6 = document.getElementById("f6").value || "";
  const v7 = document.getElementById("f7").value || "";
  const v8 = document.getElementById("f8").value || "";
  const v9 = document.getElementById("f9").value || "";

  ctx.font = "17px Georgia";
  ctx.fillText("We request the honor of your ", 250, 180);
  ctx.fillText("presence at the marriage of", 250, 202);

  ctx.font = "bold 29px Georgia";
  ctx.fillText(v1, 250, 255);
  ctx.font = "16.5px Georgia";
  ctx.fillText(v2, 250, 288);

  ctx.font = "bold 38px Georgia";
  ctx.fillText("&", 250, 335);

  ctx.font = "bold 29px Georgia";
  ctx.fillText(v3, 250, 380);
  ctx.font = "16.5px Georgia";
  ctx.fillText(v4, 250, 413);

  ctx.font = "bold 16px Georgia";
  ctx.fillText("ON", 250, 460);
  ctx.font = "bold 18px Georgia";
  ctx.fillText(v5, 250, 492);
  ctx.fillText(v6, 265, 518);
  
  ctx.font = "bold 18px Georgia";
  ctx.fillText("At", 205, 518);

  ctx.font = "bold 16px Georgia";
  ctx.fillText("VENUE", 250, 570);
  ctx.font = "16.5px Georgia";
  ctx.fillText(v7, 250, 602);
  ctx.fillText(v8, 250, 626);
  ctx.fillText(v9, 250, 655);

  // Blue transparent bar (bottom)
  ctx.fillStyle = "rgba(217, 169, 194, 0.9)";
  ctx.fillRect(0, canvas.height - 30, canvas.width, 30);

  // White text
  ctx.fillStyle = "#000000";
  ctx.font = "15px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  ctx.fillText("On videocard.in, you can get cards with numerous designs.", canvas.width / 2, canvas.height - 12.5);
  
  ctx.restore();
}

document.querySelectorAll("input").forEach(i => i.addEventListener("input", draw));

function resetForm() {
  document.querySelectorAll("input").forEach(function(input) {
    input.value = "";
  });
  draw();
  updateLimits(); // IMPORTANT
}

function updateLimits() {
  document.querySelectorAll(".field").forEach(function(field) {

    badge.textContent = input.maxLength - input.value.length;
  });
}
