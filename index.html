<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thumbnail Click Video</title>
<style>
body{
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
/* Video container */
.video-box{
  position:relative;
  width:90vw;
  max-width:270px;
  aspect-ratio:9/16;
  overflow:hidden;
  cursor:pointer;
}
/* Thumbnail */
.video-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}
/* Play button */
.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:90px;
  color:white;
  text-shadow:0 0 20px rgba(0,0,0,0.8);
}
/* iframe video */
.video-frame{
  position:absolute;
  top:0;
  left:0;
  width:120%;
  height:100%;
  border:none;
  transform:translateX(-10%);
}</style>
</head>
<body>
<div class="video-box" onclick="playVideo()">
<img src="Sample 01 Hindi.png">
<div class="play">▶</div>
</div>
<script>
function playVideo(){
document.querySelector(".video-box").innerHTML = `
<iframe
class="video-frame"
src="Sample 01 Hindi.mp4"
allow="autoplay"
allowfullscreen>
</iframe>
`;

}
</script>
</body>
</html>
