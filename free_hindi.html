<style>

/* Back button style */
.back-btn {
    background-color: #E7D2A4;
    color: #5A4520;
    font-size: 32px;
    padding: 15px;

    cursor: pointer;
    border: none;

    position: absolute;
    left: 7%;
    top: 10%;

}

.back-btn:hover {
    background-color: #D8BD84;
    color: #ffff00;
    transform: translate(-42%, -50%) scale(1.1);
}
/* Page name style */
.page-name {
    background-color: #EFE3C8;
	color:#2B2B2B;

}


body {
  font-family: Arial, sans-serif;
  background: #f8f1e9;
  margin: 0;
  padding: 20px;
 }

.container {
  display: flex;
  gap: 50px;
  max-width: 1100px;
  margin: 0 auto;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 140px;
}

canvas {
  background: #fff;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  border-radius: 12px;
  max-width: 100%;
  height: auto;
}

.form {
  width: 350px;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h4 {
  margin-top: 0;
  color: #8B0000;
  text-align: center;
}

.field {
  display: flex;
  align-items: center;
  margin-bottom: 16px;
}

.field input {
  flex: 1;
  padding: 10px 12px;
  border: 1px solid #ddd;
  border-radius: 6px;
  font-size: 15px;
}

.limit {
  width: 38px;
  height: 38px;
  background: #f4a261;
  color: white;
  text-align: center;
  line-height: 38px;
  margin-left: 10px;
  border-radius: 50%;
  font-size: 13px;
  font-weight: bold;
}

button {
  padding: 14px 28px;
  margin: 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
}

button.reset { background: #e76f51; color: white; }
button.download { background: #2a9d8f; color: white; }

/* Style for the floating WhatsApp button */
.floating-whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 1000;
}

/* Style for the image itself */
.floating-whatsapp-img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    transition: transform 0.3s ease;
}

.floating-whatsapp-img:hover {
    transform: scale(1.1);
}

@media (max-width: 768px) {
  .container {
    margin-top: 100px;
    gap: 20px;
  }
  
  .form {
    width: 90%;
    max-width: 350px;
  }
  
  .back-btn {
    font-size: 24px;
    padding: 12px;
    left: 5%;
    top: 5%;
    transform: translate(0, 0);
  }
  
  .back-btn:hover {
    transform: scale(1.1);
  }
  
  .page-name {
    left: 50%;
    top: 5%;
    transform: translate(-50%, 0);
    font-size: 14px;
    padding: 8px 20px;
  }
}

function updateLimits() {
  document.querySelectorAll(".field").forEach(function(field) {
    const input = field.querySelector("input");
    const badge = field.querySelector(".limit");
    badge.textContent = input.maxLength - input.value.length;
  });
}
